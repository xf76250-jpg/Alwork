<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI Prompt 智能寶庫 — 精選 AI 提示詞，一鍵複製，提升工作效率">
  <title>🚀 AI Prompt 智能寶庫</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    /* ─────────────────────────────────────────
       CSS 變數與主題設定 (支援深淺色)
    ───────────────────────────────────────── */
    :root {
      --bg: #f3f4f6;
      --surface: #ffffff;
      --surface-hover: #fafafa;
      --primary: #4f7cff;
      --primary-dark: #2f5ce0;
      --accent: #a855f7;
      --accent2: #06b6d4;
      --text: #1f2937;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --radius: 18px;
      --shadow-sm: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
      --shadow-lg: 0 20px 25px -5px rgba(79,124,255,0.1), 0 10px 10px -5px rgba(79,124,255,0.04);
      --font: 'Noto Sans TC', sans-serif;
    }

    [data-theme="dark"] {
      --bg: #0b0f19;
      --surface: #161f30;
      --surface-hover: #1e293b;
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --accent: #c084fc;
      --accent2: #22d3ee;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --border: #1e293b;
      --shadow-sm: 0 4px 6px -1px rgba(0,0,0,0.2);
      --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.3);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }

    /* 背景粒子裝飾 */
    .bg-blobs {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.12;
      animation: blobFloat 15s ease-in-out infinite alternate;
    }
    .blob1 { width: 600px; height: 600px; background: var(--primary); top: -200px; left: -150px; }
    .blob2 { width: 500px; height: 500px; background: var(--accent); top: 30%; right: -200px; animation-delay: 3s; }
    .blob3 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; left: 30%; animation-delay: 6s; }
    
    @keyframes blobFloat {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(40px, 30px) scale(1.1); }
    }

    .page {
      position: relative;
      z-index: 1;
    }

    /* ─────────────────────────────────────────
       導覽列
    ───────────────────────────────────────── */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 40px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-sm);
      transition: background 0.3s, border-color 0.3s;
    }
    [data-theme="dark"] .nav {
      background: rgba(22, 31, 48, 0.7);
    }
    .nav-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .nav-logo {
      font-size: 1.25rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.3px;
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    
    /* 深色模式切換按鈕 */
    .theme-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: all 0.2s;
    }
    .theme-toggle:hover {
      background: var(--border);
    }

    .nav-sheet-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 4px 12px rgba(79, 124, 255, 0.25);
    }
    .nav-sheet-btn:hover {
      opacity: 0.95;
      transform: translateY(-1px);
    }

    /* ─────────────────────────────────────────
       Hero 區塊
    ───────────────────────────────────────── */
    .hero {
      text-align: center;
      padding: 60px 24px 40px;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(79, 124, 255, 0.1);
      border: 1px solid rgba(79, 124, 255, 0.2);
      color: var(--primary);
      font-size: 0.78rem;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 999px;
      margin-bottom: 22px;
    }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 900;
      line-height: 1.2;
      margin-bottom: 18px;
      background: linear-gradient(135deg, var(--text) 0%, var(--primary) 50%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero p {
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      color: var(--text-muted);
      max-width: 580px;
      margin: 0 auto 32px;
      line-height: 1.7;
    }
    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      text-decoration: none;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(79,124,255,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .hero-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(79,124,255,0.4);
    }
    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-top: 40px;
      flex-wrap: wrap;
    }
    .stat {
      text-align: center;
      background: var(--surface);
      padding: 12px 24px;
      border-radius: 14px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      min-width: 120px;
    }
    .stat-num {
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--primary);
    }
    .stat-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ─────────────────────────────────────────
       搜尋 & 篩選器
    ───────────────────────────────────────── */
    .search-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 24px 8px;
    }
    .search-box {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 999px;
      padding: 13px 24px;
      width: 100%;
      max-width: 580px;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s;
    }
    .search-box:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79,124,255,0.15);
    }
    .search-icon {
      font-size: 1.1rem;
      color: var(--text-muted);
    }
    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 0.97rem;
      font-family: var(--font);
      color: var(--text);
      background: transparent;
    }
    .search-box input::placeholder {
      color: var(--text-muted);
      opacity: 0.7;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      padding: 20px 24px 0;
      max-width: 960px;
      margin: 0 auto;
    }
    .filter-btn {
      padding: 7px 18px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 0.83rem;
      font-family: var(--font);
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .filter-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--surface-hover);
    }
    .filter-btn.active {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-color: transparent;
      color: #fff;
      box-shadow: 0 3px 14px rgba(79,124,255,0.3);
    }

    .stats-bar {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-muted);
      padding: 16px 0 4px;
    }

    /* ─────────────────────────────────────────
       主卡片區域
    ───────────────────────────────────────── */
    .main {
      max-width: 1240px;
      margin: 24px auto 80px;
      padding: 0 24px;
    }

    .section-block {
      margin-bottom: 48px;
    }
    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--text);
    }
    .section-line {
      flex: 1;
      height: 2px;
      background: linear-gradient(90deg, var(--border), transparent);
      border-radius: 999px;
    }
    .section-count {
      font-size: 0.75rem;
      color: var(--text-muted);
      background: var(--border);
      padding: 3px 10px;
      border-radius: 999px;
      font-weight: 600;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 20px;
    }

    /* 卡片設計 */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      padding: 22px 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: var(--shadow-sm);
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
      animation: cardIn 0.45s ease both;
    }
    .card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity 0.25s;
    }
    .card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-4px);
      border-color: rgba(79,124,255,0.25);
    }
    .card:hover::after {
      opacity: 1;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    /* 分類標籤樣式 */
    .card-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.71rem;
      font-weight: 700;
      padding: 4px 11px;
      border-radius: 999px;
      background: rgba(79, 124, 255, 0.1);
      color: var(--primary);
    }
    /* 動態設定不同分類的柔和顏色 */
    .tag-內容創作 { background: #fff7ed; color: #ea580c; }
    .tag-筆記精煉, .tag-筆記整理 { background: #f0fdf4; color: #16a34a; }
    .tag-程式應用, .tag-程式生成 { background: #fef9c3; color: #a16207; }
    .tag-簡報表達 { background: #fdf4ff; color: #9333ea; }
    .tag-文本優化 { background: #f0f9ff; color: #0284c7; }
    .tag-生文校正 { background: #f0fdfa; color: #0f766e; }
    .tag-專案企劃 { background: #faf5ff; color: #7c3aed; }
    .tag-圖片生成 { background: #fef2f2; color: #dc2626; }
    .tag-資訊整理 { background: #fffbeb; color: #d97706; }

    /* 收藏按鈕 */
    .fav-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.15rem;
      color: #cbd5e1;
      transition: transform 0.15s, color 0.15s;
      padding: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .fav-btn:hover {
      transform: scale(1.2);
    }
    .fav-btn.active {
      color: #f59e0b; /* 金黃色 */
    }

    .card-title {
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1.35;
    }

    .card-content {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.7;
      flex: 1;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 6;
      -webkit-box-orient: vertical;
      white-space: pre-line;
      background: rgba(0,0,0,0.01);
      padding: 8px;
      border-radius: 8px;
      border: 1px dashed transparent;
      transition: all 0.2s;
    }
    [data-theme="dark"] .card-content {
      background: rgba(255,255,255,0.02);
    }

    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .copy-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      border: none;
      border-radius: 11px;
      font-size: 0.85rem;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 10px rgba(79, 124, 255, 0.15);
    }
    .copy-btn:hover {
      opacity: 0.92;
      transform: translateY(-1px);
    }
    .copy-btn:active {
      transform: translateY(1px);
    }
    .copy-btn.copied {
      background: linear-gradient(135deg, #10b981, #059669);
      box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2);
    }

    /* ─────────────────────────────────────────
       狀態載入與提示
    ───────────────────────────────────────── */
    .state-msg {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
    }
    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .75s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: #1e293b;
      color: #fff;
      padding: 11px 28px;
      border-radius: 999px;
      font-size: 0.87rem;
      font-weight: 600;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
      opacity: 0;
      pointer-events: none;
      z-index: 999;
      transition: all 0.35s cubic-bezier(.34, 1.56, .64, 1);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ─────────────────────────────────────────
       頁尾
    ───────────────────────────────────────── */
    .footer {
      text-align: center;
      padding: 40px 24px;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.8rem;
      background: var(--surface);
      transition: background 0.3s, border-color 0.3s;
    }
    .footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
    .footer a:hover {
      text-decoration: underline;
    }

    /* ─────────────────────────────────────────
       響應式設計
    ───────────────────────────────────────── */
    @media(max-width:768px) {
      .nav { padding: 14px 20px; }
      .hero { padding: 40px 20px 24px; }
      .hero-stats { gap: 16px; }
      .cards-grid { grid-template-columns: 1fr; }
      .main { padding: 0 16px; }
    }
    @media(max-width:480px) {
      .nav-logo { font-size: 1.1rem; }
      .nav-sheet-btn span { display: none; }
      .theme-toggle span { display: none; }
    }
  </style>
</head>
<body>

<div class="bg-blobs">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
</div>

<div class="page">

  <!-- NAV 導覽列 -->
  <nav class="nav">
    <div class="nav-left">
      <span class="nav-logo">🚀 AI Prompt 智能寶庫</span>
    </div>
    <div class="nav-right">
      <button class="theme-toggle" id="themeToggle" aria-label="切換主題">
        <span id="themeIcon">🌙</span> <span id="themeText" style="margin-left: 4px; font-size: 0.85rem;">深色</span>
      </button>
      <a class="nav-sheet-btn"
         href="https://docs.google.com/spreadsheets/d/1IV9kHmfLMrIqnv64Tt7St-sysZhB_DdXQrO5uvkwUgc/edit?usp=sharing"
         target="_blank" rel="noopener">
        📊 <span>Google Sheet 資料來源</span>
      </a>
    </div>
  </nav>

  <!-- HERO 首頁大橫幅 -->
  <section class="hero">
    <div class="hero-badge">✨ 支援深色模式與最愛收藏</div>
    <h1>AI Prompt<br>智能寶庫</h1>
    <p>精選高效 AI 提示詞，涵蓋內容創作、程式設計、筆記整理等多種工作場景。點擊收藏最愛，一鍵複製提高工作效率！</p>
    <a href="#prompts" class="hero-cta">🔍 開始瀏覽 Prompts</a>
    <div class="hero-stats">
      <div class="stat">
        <div class="stat-num" id="totalCount">0</div>
        <div class="stat-label">個 Prompt</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="catCount">0</div>
        <div class="stat-label">個分類</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="favCount">0</div>
        <div class="stat-label">個收藏</div>
      </div>
    </div>
  </section>

  <!-- 搜尋與篩選列 -->
  <section class="search-section" id="prompts">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input id="searchInput" type="text" placeholder="搜尋提示詞、分類、功能描述或關鍵字...">
    </div>
  </section>

  <!-- 分類篩選按鈕 -->
  <div class="filters" id="filters">
    <button class="filter-btn active" data-cat="全部">全部</button>
    <button class="filter-btn" data-cat="⭐ 我的收藏">⭐ 我的收藏</button>
  </div>

  <!-- 狀態統計 -->
  <div class="stats-bar" id="statsBar"></div>

  <!-- 卡片主列表區 -->
  <main class="main" id="main">
    <div class="state-msg"><div class="spinner"></div><br>正在載入智能資料庫，請稍候...</div>
  </main>

  <!-- 頁尾 -->
  <footer class="footer">
    <p>資料庫狀態：
      <a href="https://docs.google.com/spreadsheets/d/1IV9kHmfLMrIqnv64Tt7St-sysZhB_DdXQrO5uvkwUgc/edit?usp=sharing"
         target="_blank" rel="noopener">檢視原始 Google 試算表</a>
      　｜　⚡ 完美支援 GitHub Pages 託管　｜　🚀 AI Prompt 智能寶庫
    </p>
  </footer>

</div>

<!-- 複製提示元件 -->
<div class="toast" id="toast">✅ 已複製 Prompt 至剪貼簿！</div>

<script>
/* ───── 參數配置 ───── */
const SHEET_ID = '1IV9kHmfLMrIqnv64Tt7St-sysZhB_DdXQrO5uvkwUgc';
const CSV_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

// 預設精選 Prompt (當 API 連線失敗或離線時展示，提升容錯與上線成功率)
const DEFAULT_PROMPTS = [
  {
    category: "內容創作",
    title: "專業文案寫手 (Copywriter)",
    prompt: "請你擔任一位具備10年電商經驗的社群文案大師。針對以下主題：【{主題}】，撰寫一篇適合 Facebook 與 Instagram 的行銷貼文。\n\n要求：\n1. 標題要吸睛、善用 Emoji\n2. 點出痛點並給予解決方案\n3. 結尾必須有清晰的 Call to Action (呼籲行動)\n4. 字數控制在 300 字內，排版易讀。",
    section: "💡 精選創作"
  },
  {
    category: "程式生成",
    title: "SQL 專家與優化大師",
    prompt: "請你擔任資深資料庫管理工程師。接下來我會提供一段 SQL 查詢語句，請幫我：\n1. 分析其執行效能與可能的瓶頸。\n2. 重構並優化該 SQL 語句。\n3. 解釋為什麼你的優化版本效能更好，並指出是否需要新增特定的 Index (索引)。",
    section: "💻 技術開發"
  },
  {
    category: "筆記整理",
    title: "費曼學習法筆記精煉",
    prompt: "請利用「費曼學習法」來解釋以下概念：【{概念}】。請想像你正在向一個10歲的孩子解釋這個知識：\n1. 使用最直白、無專有名詞的語言說明。\n2. 提供一個日常生活中的有趣比喻。\n3. 歸納出最核心的 3 個重點，幫助快速記憶。",
    section: "🧠 知識管理"
  },
  {
    category: "專案企劃",
    title: "SWOT 競爭對手分析器",
    prompt: "請幫我針對以下企業或新產品進行 SWOT 分析：【{產品/企業名稱}】。\n請分別列出：\n- Strengths (優勢)：核心競爭力為何？\n- Weaknesses (劣勢)：目前面臨的內部限制？\n- Opportunities (機會)：外部市場有哪些利多？\n- Threats (威脅)：哪些外部因素可能帶來挑戰？\n並在最後提供 3 個具體的策略建議。",
    section: "🎯 商業策劃"
  }
];

let allData    = [];
let currentCat = '全部';
let searchQ    = '';
let favorites  = JSON.parse(localStorage.getItem('prompt_favorites') || '[]');

/* ───── 初始化主題 (Dark/Light Mode) ───── */
function initTheme() {
  const savedTheme = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', savedTheme);
  updateThemeUI(savedTheme);
}

function updateThemeUI(theme) {
  const icon = document.getElementById('themeIcon');
  const text = document.getElementById('themeText');
  if (theme === 'dark') {
    icon.textContent = '☀️';
    text.textContent = '淺色';
  } else {
    icon.textContent = '🌙';
    text.textContent = '深色';
  }
}

document.getElementById('themeToggle').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  const target = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', target);
  localStorage.setItem('theme', target);
  updateThemeUI(target);
});

/* ───── CSV 轉 JSON 處理器 ───── */
function parseCSV(raw) {
  const rows = [];
  let row = [], field = '', inQ = false;
  for (let i = 0; i < raw.length; i++) {
    const c = raw[i];
    if (inQ) {
      if (c === '"' && raw[i+1] === '"') { field += '"'; i++; }
      else if (c === '"') { inQ = false; }
      else { field += c; }
    } else {
      if      (c === '"')  { inQ = true; }
      else if (c === ',')  { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c !== '\r') { field += c; }
    }
  }
  if (field || row.length) { row.push(field); rows.push(row); }
  return rows;
}

/* ───── 尋找表頭索引 ───── */
function findCol(headers, ...keys) {
  for (const k of keys) {
    const i = headers.findIndex(h => h.trim().includes(k));
    if (i !== -1) return i;
  }
  return -1;
}

/* ───── HTML 安全轉義 ───── */
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ───── 載入資料 (優先從網路，連不上則用內建) ───── */
async function loadData() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error('雲端資料表為空或格式不符');

    const headers = rows[0];
    let iCat    = findCol(headers, '分類', '類別', 'Category', 'category', '標籤');
    let iTitle  = findCol(headers, '標題', '名稱', 'Title', 'title', 'Name');
    let iPrompt = findCol(headers, 'Prompt', 'prompt', '提示詞', '提示', '內容', 'Content');
    let iSection= findCol(headers, '主題', '區塊', 'Section', 'section', 'Group', '群組');

    if (iCat < 0 && iTitle < 0 && iPrompt < 0) {
      iCat = 0; iTitle = 1; iPrompt = 2;
    }

    allData = rows.slice(1)
      .filter(r => r.some(c => c.trim()))
      .map((r, index) => ({
        id: `sheet-${index}`,
        category: iCat    >= 0 ? (r[iCat]   ||'').trim() : '未分類',
        title:    iTitle  >= 0 ? (r[iTitle]  ||'').trim() : '無標題',
        prompt:   iPrompt >= 0 ? (r[iPrompt] ||'').trim() : '',
        section:  iSection>= 0 ? (r[iSection]||'').trim() : '',
      }))
      .filter(d => d.title || d.prompt);

    if (allData.length === 0) {
      throw new Error("試算表解析出 0 筆資料");
    }

  } catch(e) {
    console.warn("使用預設精選 Prompt 作為備用機制，錯誤原因:", e.message);
    // 網路斷開或試算表未設定好時，載入預設資料，保證網頁展示完整
    allData = DEFAULT_PROMPTS.map((d, index) => ({
      id: `default-${index}`,
      ...d
    }));
  } finally {
    updateGlobalStats();
    buildFilters();
    render();
  }
}

/* ───── 更新全局數據狀態 ───── */
function updateGlobalStats() {
  const cats = new Set(allData.map(d=>d.category).filter(Boolean));
  document.getElementById('totalCount').textContent = allData.length;
  document.getElementById('catCount').textContent   = cats.size;
  document.getElementById('favCount').textContent   = favorites.length;
}

/* ───── 建立篩選按鈕 ───── */
function buildFilters() {
  const cats = ['全部', '⭐ 我的收藏', ...new Set(allData.map(d=>d.category).filter(Boolean))];
  const wrap = document.getElementById('filters');
  
  wrap.innerHTML = cats.map(c => {
    const isActive = c === currentCat ? ' active' : '';
    return `<button class="filter-btn${isActive}" data-cat="${esc(c)}">${esc(c)}</button>`;
  }).join('');

  wrap.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentCat = btn.dataset.cat;
      wrap.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });
}

/* ───── 收藏與取消收藏 ───── */
function toggleFavorite(id) {
  const index = favorites.indexOf(id);
  if (index === -1) {
    favorites.push(id);
  } else {
    favorites.splice(index, 1);
  }
  localStorage.setItem('prompt_favorites', JSON.stringify(favorites));
  updateGlobalStats();
  
  // 若目前正在收藏頁面，則立即重繪
  if (currentCat === '⭐ 我的收藏') {
    render();
  } else {
    // 否則只更新點擊卡片的星星樣式
    const starBtn = document.querySelector(`.fav-btn[data-id="${id}"]`);
    if (starBtn) {
      starBtn.classList.toggle('active');
      starBtn.textContent = favorites.includes(id) ? '★' : '☆';
    }
  }
}

/* ───── 渲染卡片 ───── */
function render() {
  const q = searchQ.toLowerCase();
  
  // 篩選
  const filtered = allData.filter(d => {
    const isFav = favorites.includes(d.id);
    const matchCat = currentCat === '全部' || 
                    (currentCat === '⭐ 我的收藏' && isFav) || 
                    (d.category === currentCat);
                    
    const matchQ = !q || [d.title, d.prompt, d.category, d.section].some(s => 
      s && s.toLowerCase().includes(q)
    );
    return matchCat && matchQ;
  });

  document.getElementById('statsBar').textContent =
    filtered.length ? `為您呈現 ${filtered.length} 個符合條件的 AI 提示詞` : '';

  const main = document.getElementById('main');
  if (!filtered.length) {
    if (currentCat === '⭐ 我的收藏') {
      main.innerHTML = `<div class="state-msg">⭐ 您的收藏夾目前空空的唷！點擊卡片右上角的星星即可收藏。</div>`;
    } else {
      main.innerHTML = `<div class="state-msg">😔 找不到任何符合「${esc(q)}」的 Prompt，請換個關鍵字試試看！</div>`;
    }
    return;
  }

  // 依照 Section 或 Category 分組
  const useSection = allData.some(d => d.section);
  const groupKey   = d => useSection ? (d.section || '📌 綜合提示詞') : (d.category || '💡 一般 Prompt');

  const groups = {};
  filtered.forEach(d => {
    const k = groupKey(d);
    if (!groups[k]) groups[k] = [];
    groups[k].push(d);
  });

  const emojis = ['💡','⚡','🧠','🎨','💻','📝','🎯','📊','🔧','🌟','💎','🔮','🌈','🚀'];
  let html = '';
  
  Object.entries(groups).forEach(([sec, items], si) => {
    const hasEmoji = /^\p{Emoji}/u.test(sec);
    const pre = hasEmoji ? '' : emojis[si % emojis.length] + ' ';
    html += `
      <div class="section-block">
        <div class="section-header">
          <h2 class="section-title">${pre}${esc(sec)}</h2>
          <div class="section-line"></div>
          <span class="section-count">${items.length} 筆</span>
        </div>
        <div class="cards-grid">
          ${items.map((d, i) => cardHTML(d, si * 100 + i)).join('')}
        </div>
      </div>`;
  });

  main.innerHTML = html;

  // 綁定複製按鈕事件
  main.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const text = btn.dataset.prompt;
      copyToClipboard(text).then(() => flashBtn(btn));
    });
  });

  // 綁定收藏按鈕事件
  main.querySelectorAll('.fav-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.dataset.id;
      toggleFavorite(id);
    });
  });
}

/* ───── 跨瀏覽器複製功能 (相容 iframe) ───── */
function copyToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) {
    return navigator.clipboard.writeText(text);
  } else {
    // 備用機制 (適用於 iframe 環境)
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try {
      document.execCommand('copy');
      document.body.removeChild(ta);
      return Promise.resolve();
    } catch (err) {
      document.body.removeChild(ta);
      return Promise.reject(err);
    }
  }
}

function flashBtn(btn) {
  const orig = btn.innerHTML;
  btn.innerHTML = '✨ 已複製到剪貼簿！';
  btn.classList.add('copied');
  showToast();
  setTimeout(() => { 
    btn.innerHTML = orig; 
    btn.classList.remove('copied'); 
  }, 1800);
}

/* ───── 生成卡片 HTML ───── */
function cardHTML(d, idx) {
  const tagCls = 'tag-' + (d.category || '');
  const delay  = Math.min((idx % 8) * 50, 300);
  const isFav  = favorites.includes(d.id);
  const starIcon = isFav ? '★' : '☆';
  const starClass = isFav ? 'active' : '';

  return `
    <div class="card" style="animation-delay:${delay}ms">
      <div class="card-meta">
        ${d.category ? `<span class="card-tag ${tagCls}">${esc(d.category)}</span>` : '<span></span>'}
        <button class="fav-btn ${starClass}" data-id="${d.id}" title="加入/取消收藏">
          ${starIcon}
        </button>
      </div>
      ${d.title ? `<div class="card-title">${esc(d.title)}</div>` : ''}
      <div class="card-content">${esc(d.prompt)}</div>
      <div class="card-actions">
        <button class="copy-btn" data-prompt="${esc(d.prompt)}">
          📋 複製 Prompt
        </button>
      </div>
    </div>`;
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2400);
}

/* ───── 搜尋輸入監聽 ───── */
document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value; 
  render();
});

/* ───── 網頁載入啟動 ───── */
window.onload = function() {
  initTheme();
  loadData();
}
</script>
