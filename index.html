<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="AI Prompt 智能寶庫 — 精選 AI 提示詞，一鍵複製，提升工作效率">
<title>🚀 AI Prompt 智能寶庫</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────────
   Reset & Variables
───────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg: #f0f2f8;
  --surface: #ffffff;
  --primary: #4f7cff;
  --primary-dark: #2f5ce0;
  --accent: #a855f7;
  --accent2: #06b6d4;
  --text: #18243d;
  --muted: #64748b;
  --border: #e2e8f0;
  --radius: 18px;
  --shadow-sm: 0 2px 12px rgba(0,0,0,0.07);
  --shadow-lg: 0 12px 40px rgba(79,124,255,0.18);
  --font: 'Noto Sans TC', sans-serif;
}

html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ─────────────────────────────────────────
   Animated background blobs
───────────────────────────────────────── */
.bg-blobs{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:0;overflow:hidden
}
.blob{
  position:absolute;border-radius:50%;filter:blur(80px);opacity:0.13;
  animation:blobFloat 12s ease-in-out infinite alternate
}
.blob1{width:600px;height:600px;background:#4f7cff;top:-200px;left:-150px;animation-delay:0s}
.blob2{width:500px;height:500px;background:#a855f7;top:30%;right:-200px;animation-delay:3s}
.blob3{width:400px;height:400px;background:#06b6d4;bottom:-100px;left:30%;animation-delay:6s}
@keyframes blobFloat{
  from{transform:translate(0,0) scale(1)}
  to{transform:translate(30px,20px) scale(1.08)}
}

/* ─────────────────────────────────────────
   Layout wrapper
───────────────────────────────────────── */
.page{position:relative;z-index:1}

/* ─────────────────────────────────────────
   NAV
───────────────────────────────────────── */
.nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 40px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,0.6);
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 20px rgba(0,0,0,0.04)
}
.nav-logo{
  font-size:1.15rem;font-weight:900;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:-0.3px
}
.nav-link{
  font-size:0.84rem;font-weight:500;color:var(--muted);
  text-decoration:none;transition:color .2s
}
.nav-link:hover{color:var(--primary)}
.nav-sheet-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:999px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:#fff;font-size:0.82rem;font-weight:600;
  text-decoration:none;transition:opacity .2s,transform .15s;
  box-shadow:0 2px 12px rgba(79,124,255,0.35)
}
.nav-sheet-btn:hover{opacity:0.9;transform:translateY(-1px)}

/* ─────────────────────────────────────────
   HERO
───────────────────────────────────────── */
.hero{
  text-align:center;
  padding:72px 24px 52px;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(79,124,255,0.1);border:1px solid rgba(79,124,255,0.22);
  color:var(--primary);font-size:0.78rem;font-weight:700;
  padding:5px 14px;border-radius:999px;margin-bottom:22px;
  letter-spacing:0.5px
}
.hero h1{
  font-size:clamp(2.2rem,5vw,3.4rem);
  font-weight:900;line-height:1.15;
  letter-spacing:-1px;margin-bottom:18px;
  background:linear-gradient(135deg,var(--text) 0%,var(--primary) 50%,var(--accent) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent
}
.hero p{
  font-size:clamp(0.95rem,2vw,1.1rem);
  color:var(--muted);max-width:540px;margin:0 auto 32px;line-height:1.7
}
.hero-cta{
  display:inline-flex;align-items:center;gap:8px;
  padding:13px 28px;border-radius:999px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:#fff;font-size:0.95rem;font-weight:700;
  text-decoration:none;border:none;cursor:pointer;
  box-shadow:0 4px 20px rgba(79,124,255,0.4);
  transition:transform .2s,box-shadow .2s
}
.hero-cta:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(79,124,255,0.45)}
.hero-stats{
  display:flex;justify-content:center;gap:40px;
  margin-top:44px;flex-wrap:wrap
}
.stat{text-align:center}
.stat-num{
  font-size:1.8rem;font-weight:900;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent
}
.stat-label{font-size:0.8rem;color:var(--muted);margin-top:2px}

/* ─────────────────────────────────────────
   SEARCH
───────────────────────────────────────── */
.search-section{
  display:flex;flex-direction:column;align-items:center;
  padding:0 24px 8px
}
.search-box{
  display:flex;align-items:center;gap:12px;
  background:var(--surface);border:2px solid var(--border);
  border-radius:999px;padding:13px 24px;
  width:100%;max-width:580px;
  box-shadow:var(--shadow-sm);
  transition:border-color .2s,box-shadow .2s
}
.search-box:focus-within{
  border-color:var(--primary);
  box-shadow:0 0 0 4px rgba(79,124,255,0.12)
}
.search-icon{font-size:1.1rem;color:var(--muted)}
.search-box input{
  flex:1;border:none;outline:none;font-size:0.97rem;
  font-family:var(--font);color:var(--text);background:transparent
}
.search-box input::placeholder{color:#c0c8d8}

/* ─────────────────────────────────────────
   FILTERS
───────────────────────────────────────── */
.filters{
  display:flex;flex-wrap:wrap;justify-content:center;
  gap:8px;padding:20px 24px 0;max-width:960px;margin:0 auto
}
.filter-btn{
  padding:7px 18px;border-radius:999px;
  border:1.5px solid var(--border);background:var(--surface);
  font-size:0.83rem;font-family:var(--font);font-weight:500;
  color:var(--muted);cursor:pointer;white-space:nowrap;
  transition:all .18s
}
.filter-btn:hover{border-color:var(--primary);color:var(--primary);background:#f0f4ff}
.filter-btn.active{
  background:linear-gradient(135deg,var(--primary),var(--accent));
  border-color:transparent;color:#fff;
  box-shadow:0 3px 14px rgba(79,124,255,0.32)
}

/* ─────────────────────────────────────────
   STATS BAR
───────────────────────────────────────── */
.stats-bar{
  text-align:center;font-size:0.8rem;color:var(--muted);
  padding:12px 0 4px
}

/* ─────────────────────────────────────────
   MAIN CONTENT
───────────────────────────────────────── */
.main{max-width:1240px;margin:36px auto 80px;padding:0 24px}

/* Section */
.section-block{margin-bottom:56px}
.section-header{
  display:flex;align-items:center;gap:12px;
  margin-bottom:24px
}
.section-title{
  font-size:1.2rem;font-weight:800;color:var(--text)
}
.section-line{
  flex:1;height:2px;
  background:linear-gradient(90deg,var(--border),transparent);
  border-radius:999px
}
.section-count{
  font-size:0.75rem;color:var(--muted);
  background:var(--border);padding:3px 10px;border-radius:999px;font-weight:600
}

/* Cards Grid */
.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:20px
}

/* Card */
.card{
  background:var(--surface);border-radius:var(--radius);
  border:1.5px solid var(--border);
  padding:22px 20px 18px;
  display:flex;flex-direction:column;gap:12px;
  box-shadow:var(--shadow-sm);
  transition:box-shadow .25s,transform .25s,border-color .25s;
  position:relative;overflow:hidden;
  animation:cardIn .45s ease both
}
.card::after{
  content:'';position:absolute;
  top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--primary),var(--accent),var(--accent2));
  opacity:0;transition:opacity .25s
}
.card:hover{
  box-shadow:var(--shadow-lg);
  transform:translateY(-5px);
  border-color:rgba(79,124,255,0.25)
}
.card:hover::after{opacity:1}
@keyframes cardIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

/* Card Tag */
.card-tag{
  display:inline-flex;align-items:center;gap:4px;
  font-size:0.71rem;font-weight:700;letter-spacing:0.3px;
  padding:4px 11px;border-radius:999px;width:fit-content;
  background:#eff6ff;color:var(--primary)
}
/* Category colours */
.tag-內容創作{background:#fff7ed;color:#ea580c}
.tag-筆記精煉{background:#f0fdf4;color:#16a34a}
.tag-程式應用{background:#fef9c3;color:#92400e}
.tag-簡報表達{background:#fdf4ff;color:#9333ea}
.tag-程式生成{background:#fff1f2;color:#e11d48}
.tag-文本優化{background:#f0f9ff;color:#0284c7}
.tag-生文校正{background:#f0fdfa;color:#0f766e}
.tag-專案企劃{background:#faf5ff;color:#7c3aed}
.tag-圖片生成{background:#fef2f2;color:#dc2626}
.tag-筆記整理{background:#ecfdf5;color:#059669}
.tag-資訊整理{background:#fffbeb;color:#d97706}
.tag-心智圖法{background:#f5f3ff;color:#6d28d9}

.card-title{
  font-size:1.1rem;font-weight:800;
  color:var(--text);line-height:1.3
}
.card-content{
  font-size:0.8rem;color:var(--muted);
  line-height:1.75;flex:1;
  overflow:hidden;display:-webkit-box;
  -webkit-line-clamp:6;-webkit-box-orient:vertical;
  white-space:pre-line
}
.copy-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;padding:11px;margin-top:2px;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;border:none;border-radius:11px;
  font-size:0.87rem;font-weight:700;font-family:var(--font);
  cursor:pointer;transition:opacity .18s,transform .12s,background .2s;
  box-shadow:0 2px 10px rgba(79,124,255,0.25)
}
.copy-btn:hover{opacity:0.92;transform:scale(1.01)}
.copy-btn:active{transform:scale(0.97)}
.copy-btn.copied{
  background:linear-gradient(135deg,#10b981,#059669);
  box-shadow:0 2px 10px rgba(16,185,129,0.3)
}

/* ─────────────────────────────────────────
   Loading / Empty states
───────────────────────────────────────── */
.state-msg{
  text-align:center;padding:80px 24px;color:var(--muted)
}
.spinner{
  display:inline-block;width:40px;height:40px;
  border:3px solid var(--border);border-top-color:var(--primary);
  border-radius:50%;animation:spin .75s linear infinite;margin-bottom:16px
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─────────────────────────────────────────
   Toast
───────────────────────────────────────── */
.toast{
  position:fixed;bottom:30px;left:50%;
  transform:translateX(-50%) translateY(70px);
  background:#1e293b;color:#fff;
  padding:11px 28px;border-radius:999px;
  font-size:0.87rem;font-weight:600;
  box-shadow:0 6px 28px rgba(0,0,0,0.25);
  opacity:0;pointer-events:none;z-index:999;
  transition:all .35s cubic-bezier(.34,1.56,.64,1);
  display:flex;align-items:center;gap:8px
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─────────────────────────────────────────
   FOOTER
───────────────────────────────────────── */
.footer{
  text-align:center;padding:32px 24px;
  border-top:1px solid var(--border);
  color:var(--muted);font-size:0.8rem;
  background:rgba(255,255,255,0.5)
}
.footer a{color:var(--primary);text-decoration:none}
.footer a:hover{text-decoration:underline}

/* ─────────────────────────────────────────
   Responsive
───────────────────────────────────────── */
@media(max-width:768px){
  .nav{padding:14px 20px}
  .hero{padding:52px 20px 36px}
  .hero-stats{gap:24px}
  .cards-grid{grid-template-columns:1fr}
  .main{padding:0 16px}
}
@media(max-width:480px){
  .nav-logo{font-size:1rem}
  .nav-sheet-btn span{display:none}
}
</style>
</head>
<body>

<div class="bg-blobs">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
</div>

<div class="page">

  <!-- NAV -->
  <nav class="nav">
    <span class="nav-logo">🚀 AI Prompt 智能寶庫</span>
    <a class="nav-sheet-btn"
       href="https://docs.google.com/spreadsheets/d/1IV9kHmfLMrIqnv64Tt7St-sysZhB_DdXQrO5uvkwUgc/edit?usp=sharing"
       target="_blank" rel="noopener">
      📊 <span>開啟 Google Sheet</span>
    </a>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-badge">✨ 持續更新中</div>
    <h1>AI Prompt<br>智能寶庫</h1>
    <p>精選高效 AI 提示詞，涵蓋內容創作、程式應用、筆記整理等多種場景。一鍵複製，立即使用。</p>
    <a href="#prompts" class="hero-cta">🔍 瀏覽所有 Prompt</a>
    <div class="hero-stats">
      <div class="stat">
        <div class="stat-num" id="totalCount">—</div>
        <div class="stat-label">個 Prompt</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="catCount">—</div>
        <div class="stat-label">個分類</div>
      </div>
      <div class="stat">
        <div class="stat-num">免費</div>
        <div class="stat-label">完全開放</div>
      </div>
    </div>
  </section>

  <!-- SEARCH -->
  <section class="search-section" id="prompts">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input id="searchInput" type="text" placeholder="搜尋提示詞、分類或關鍵字...">
    </div>
  </section>

  <!-- FILTERS -->
  <div class="filters" id="filters">
    <button class="filter-btn active" data-cat="全部">全部</button>
  </div>

  <!-- STATS BAR -->
  <div class="stats-bar" id="statsBar"></div>

  <!-- CARDS -->
  <main class="main" id="main">
    <div class="state-msg"><div class="spinner"></div><br>載入資料中…</div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <p>資料來源：
      <a href="https://docs.google.com/spreadsheets/d/1IV9kHmfLMrIqnv64Tt7St-sysZhB_DdXQrO5uvkwUgc/edit?usp=sharing"
         target="_blank" rel="noopener">Google Sheet</a>
      　｜　以 GitHub Pages 託管　｜　🚀 AI Prompt 智能寶庫
    </p>
  </footer>

</div><!-- .page -->

<div class="toast" id="toast">✅ 已複製 Prompt！</div>

<script>
/* ───── Config ───── */
const SHEET_ID = '1IV9kHmfLMrIqnv64Tt7St-sysZhB_DdXQrO5uvkwUgc';
const CSV_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;

let allData    = [];
let currentCat = '全部';
let searchQ    = '';

/* ───── CSV Parser ───── */
function parseCSV(raw) {
  const rows = [];
  let row = [], field = '', inQ = false;
  for (let i = 0; i < raw.length; i++) {
    const c = raw[i];
    if (inQ) {
      if (c === '"' && raw[i+1] === '"') { field += '"'; i++; }
      else if (c === '"') { inQ = false; }
      else { field += c; }
    } else {
      if      (c === '"')  { inQ = true; }
      else if (c === ',')  { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c !== '\r') { field += c; }
    }
  }
  if (field || row.length) { row.push(field); rows.push(row); }
  return rows;
}

/* ───── Find column index ───── */
function findCol(headers, ...keys) {
  for (const k of keys) {
    const i = headers.findIndex(h => h.trim().includes(k));
    if (i !== -1) return i;
  }
  return -1;
}

/* ───── Escape HTML ───── */
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ───── Load data from Google Sheet ───── */
async function loadData() {
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error('資料為空');

    const headers = rows[0];
    let iCat    = findCol(headers,'分類','類別','Category','category','標籤');
    let iTitle  = findCol(headers,'標題','名稱','Title','title','Name');
    let iPrompt = findCol(headers,'Prompt','prompt','提示詞','提示','內容','Content');
    let iSection= findCol(headers,'主題','區塊','Section','section','Group','群組');

    // fallback: use first 3 columns
    if (iCat < 0 && iTitle < 0 && iPrompt < 0) {
      iCat = 0; iTitle = 1; iPrompt = 2;
    }

    allData = rows.slice(1)
      .filter(r => r.some(c => c.trim()))
      .map(r => ({
        category: iCat    >= 0 ? (r[iCat]   ||'').trim() : '',
        title:    iTitle  >= 0 ? (r[iTitle]  ||'').trim() : '',
        prompt:   iPrompt >= 0 ? (r[iPrompt] ||'').trim() : '',
        section:  iSection>= 0 ? (r[iSection]||'').trim() : '',
      }))
      .filter(d => d.title || d.prompt);

    // update hero stats
    const cats = new Set(allData.map(d=>d.category).filter(Boolean));
    document.getElementById('totalCount').textContent = allData.length;
    document.getElementById('catCount').textContent   = cats.size;

    buildFilters();
    render();
  } catch(e) {
    document.getElementById('main').innerHTML = `
      <div class="state-msg">
        <div style="font-size:2.5rem;margin-bottom:16px">⚠️</div>
        <strong style="font-size:1.1rem">無法載入資料</strong><br>
        <small style="color:#94a3b8;display:block;margin-top:8px">${esc(e.message)}</small><br>
        <small>請確認 Google Sheet 已設為「知道連結的任何人可查看」</small>
      </div>`;
  }
}

/* ───── Build filter buttons ───── */
function buildFilters() {
  const cats = ['全部', ...new Set(allData.map(d=>d.category).filter(Boolean))];
  const wrap = document.getElementById('filters');
  wrap.innerHTML = cats.map(c =>
    `<button class="filter-btn${c==='全部'?' active':''}" data-cat="${esc(c)}">${esc(c)}</button>`
  ).join('');
  wrap.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentCat = btn.dataset.cat;
      wrap.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });
}

/* ───── Render cards ───── */
function render() {
  const q = searchQ.toLowerCase();
  const filtered = allData.filter(d => {
    const matchCat = currentCat === '全部' || d.category === currentCat;
    const matchQ   = !q || [d.title,d.prompt,d.category].some(s=>s.toLowerCase().includes(q));
    return matchCat && matchQ;
  });

  document.getElementById('statsBar').textContent =
    filtered.length ? `顯示 ${filtered.length} 個 Prompt` : '';

  const main = document.getElementById('main');
  if (!filtered.length) {
    main.innerHTML = `<div class="state-msg">😔 找不到符合的 Prompt</div>`;
    return;
  }

  // Group by section or category
  const useSection = allData.some(d=>d.section);
  const groupKey   = d => useSection ? (d.section||'其他') : (d.category||'所有 Prompts');

  const groups = {};
  filtered.forEach(d => {
    const k = groupKey(d);
    if (!groups[k]) groups[k] = [];
    groups[k].push(d);
  });

  const emojis = ['🧠','✨','🎯','💡','🚀','📝','🎨','🔧','📊','🌟','💎','⚡','🎭','🔮','🌈'];
  let html = '';
  Object.entries(groups).forEach(([sec, items], si) => {
    const hasEmoji = /^\p{Emoji}/u.test(sec);
    const pre = hasEmoji ? '' : emojis[si % emojis.length] + ' ';
    html += `
      <div class="section-block">
        <div class="section-header">
          <h2 class="section-title">${pre}${esc(sec)}</h2>
          <div class="section-line"></div>
          <span class="section-count">${items.length} 個</span>
        </div>
        <div class="cards-grid">
          ${items.map((d,i)=>cardHTML(d, si*100+i)).join('')}
        </div>
      </div>`;
  });

  main.innerHTML = html;

  // Bind copy buttons
  main.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const text = btn.dataset.prompt;
      (navigator.clipboard
        ? navigator.clipboard.writeText(text)
        : Promise.resolve(fallbackCopy(text))
      ).then(() => flashBtn(btn));
    });
  });
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  document.execCommand('copy'); document.body.removeChild(ta);
}

function flashBtn(btn) {
  const orig = btn.innerHTML;
  btn.innerHTML = '✅ 已複製！';
  btn.classList.add('copied');
  showToast();
  setTimeout(()=>{ btn.innerHTML=orig; btn.classList.remove('copied'); }, 1800);
}

function cardHTML(d, idx) {
  const tagCls = 'tag-' + (d.category||'');
  const delay  = Math.min((idx%8)*55, 330);
  return `
    <div class="card" style="animation-delay:${delay}ms">
      ${d.category ? `<span class="card-tag ${tagCls}">${esc(d.category)}</span>` : ''}
      ${d.title    ? `<div class="card-title">${esc(d.title)}</div>`              : ''}
      <div class="card-content">${esc(d.prompt)}</div>
      <button class="copy-btn" data-prompt="${esc(d.prompt)}">
        📋 複製 Prompt
      </button>
    </div>`;
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.classList.remove('show'), 2400);
}

/* ───── Events ───── */
document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value; render();
});

/* ───── Init ───── */
loadData();
</script>
</body>
</html>
